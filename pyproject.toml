[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-video-editor"
version = "0.1.0"
description = "AI-assisted transcript-based video editing pipeline"
requires-python = ">=3.13"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "loguru>=0.7",
]

[project.scripts]
ai-video-editor = "ai_video_editor.cli.app:main"

[tool.hatch.build.targets.wheel]
packages = ["ai_video_editor"]
